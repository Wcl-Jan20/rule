name: singbox
on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.0

      - name: Setup sing-box
        env:
          SING_BOX_DEB_URL: "https://github.com/SagerNet/sing-box/releases/download/v1.14.0-alpha.14/sing-box_1.14.0-alpha.14_linux_amd64.deb"
        run: |
          set -Eeuo pipefail
          wget -O sing-box.deb $SING_BOX_DEB_URL
          sudo dpkg -i sing-box.deb
          sing-box version

      - name: Set up Python3
        uses: actions/setup-python@v5.2.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests pyyaml

      - name: Run Python script
        working-directory: ./singbox/
        run: |
          python3 << 'EOF'
          import pandas as pd
          import re
          import concurrent.futures
          import os
          import json
          import subprocess
          import requests
          import yaml
          import ipaddress
          from collections import defaultdict

          MAP_DICT = {
              'DOMAIN': 'domain',
              'HOST': 'domain',
              'host': 'domain',
              'DOMAIN-SUFFIX': 'domain_suffix',
              'HOST-SUFFIX': 'domain_suffix',
              'host-suffix': 'domain_suffix',
              'DOMAIN-KEYWORD': 'domain_keyword',
              'HOST-KEYWORD': 'domain_keyword',
              'host-keyword': 'domain_keyword',
              'IP-CIDR': 'ip_cidr',
              'ip-cidr': 'ip_cidr',
              'IP-CIDR6': 'ip_cidr',
              'IP6-CIDR': 'ip_cidr',
              'SRC-IP-CIDR': 'source_ip_cidr',
              'GEOIP': 'geoip',
              'DST-PORT': 'port',
              'SRC-PORT': 'source_port',
              'URL-REGEX': 'domain_regex',
              'DOMAIN-REGEX': 'domain_regex'
          }

          RULE_ORDER = [
              'domain',
              'domain_suffix',
              'domain_keyword',
              'domain_regex',
              'ip_cidr',
              'source_ip_cidr',
              'geoip',
              'port',
              'source_port'
          ]

          def read_yaml_from_url(url):
              headers = {'User-Agent': 'Mozilla/5.0'}
              response = requests.get(url, headers=headers, timeout=10)
              response.raise_for_status()
              yaml_data = yaml.safe_load(response.text)
              return yaml_data

          def is_valid_ip_cidr(s):
              s = s.strip()
              if not s or s.startswith('#'):
                  return False
              try:
                  ipaddress.ip_network(s, strict=False)
                  return True
              except:
                  return False

          def normalize_address(address):
              address = address.strip()
              while address.startswith('+') or address.startswith('.'):
                  address = address[1:]
              return address if address else None

          def read_list_from_url(url):
              headers = {'User-Agent': 'Mozilla/5.0'}
              try:
                  response = requests.get(url, headers=headers, timeout=10)
                  if response.status_code != 200:
                      return None, []
              except Exception as e:
                  print(f"[WARNING] 无法读取 {url}: {str(e)}")
                  return None, []
              
              lines = response.text.strip().split('\n')
              rows = []
              
              for line in lines:
                  line = line.strip()
                  if not line or line.startswith('#'):
                      continue
                  
                  if ',' in line:
                      parts = [p.strip() for p in line.split(',')]
                      rows.append({
                          'pattern': parts[0] if len(parts) > 0 else '',
                          'address': parts[1] if len(parts) > 1 else '',
                          'other': parts[2] if len(parts) > 2 else None,
                          'other2': parts[3] if len(parts) > 3 else None,
                          'other3': parts[4] if len(parts) > 4 else None
                      })
                  else:
                      if is_valid_ip_cidr(line):
                          pattern = 'IP-CIDR'
                          address = line
                      elif line.startswith('+.') or line.startswith('.'):
                          pattern = 'DOMAIN-SUFFIX'
                          address = normalize_address(line)
                      else:
                          pattern = 'DOMAIN'
                          address = line
                      
                      if address:
                          rows.append({
                              'pattern': pattern,
                              'address': address,
                              'other': None,
                              'other2': None,
                              'other3': None
                          })
              
              df = pd.DataFrame(rows, columns=['pattern', 'address', 'other', 'other2', 'other3']) if rows else None
              return df, []

          def parse_and_convert_to_dataframe(link):
              rules = []
              df = None
              
              if link.endswith('.yaml') or link.endswith('.yml'):
                  try:
                      yaml_data = read_yaml_from_url(link)
                      rows = []
                      
                      if isinstance(yaml_data, dict):
                          items = yaml_data.get('payload', [])
                      elif isinstance(yaml_data, list):
                          items = yaml_data
                      else:
                          items = []
                      
                      for item in items:
                          address = str(item).strip("'\"")
                          
                          if ',' not in str(item):
                              if is_valid_ip_cidr(str(item)):
                                  pattern = 'IP-CIDR'
                              else:
                                  if address.startswith('+.') or address.startswith('.'):
                                      pattern = 'DOMAIN-SUFFIX'
                                      address = normalize_address(address)
                                  else:
                                      pattern = 'DOMAIN'
                          else:
                              parts = str(item).split(',', 1)
                              pattern = parts[0].strip()
                              address = parts[1].strip() if len(parts) > 1 else ''
                          
                          if address:
                              rows.append({
                                  'pattern': pattern.strip(),
                                  'address': address.strip(),
                                  'other': None
                              })
                      
                      if rows:
                          df = pd.DataFrame(rows, columns=['pattern', 'address', 'other'])
                  except Exception as e:
                      print(f"[WARNING] YAML 解析失败: {str(e)}, 使用纯文本解析")
                      df, rules = read_list_from_url(link)
              else:
                  df, rules = read_list_from_url(link)
              
              return df, rules

          def sort_dict(obj):
              if isinstance(obj, dict):
                  return {k: sort_dict(obj[k]) for k in sorted(obj)}
              elif isinstance(obj, list) and all(isinstance(elem, dict) for elem in obj):
                  return sorted([sort_dict(x) for x in obj], key=lambda d: str(sorted(d.keys())[0]) if d else "")
              elif isinstance(obj, list):
                  return [sort_dict(x) for x in obj]
              else:
                  return obj

          def build_result_rules(df, rules_list):
              result_rules = {
                  "version": 5,
                  "rules": []
              }
              
              if rules_list:
                  for rules in rules_list:
                      if rules:
                          result_rules["rules"].extend(rules)
              
              if df is not None and not df.empty:
                  pattern_groups = defaultdict(list)
                  
                  for _, row in df.iterrows():
                      pattern = row['pattern']
                      address = row['address']
                      
                      if pd.isna(address) or not str(address).strip():
                          continue
                      
                      if pattern in MAP_DICT:
                          mapped_pattern = MAP_DICT[pattern]
                          pattern_groups[mapped_pattern].append(str(address).strip())
                  
                  for rule_type in RULE_ORDER:
                      if rule_type in pattern_groups:
                          unique_addresses = list(set(pattern_groups[rule_type]))
                          unique_addresses.sort()
                          result_rules["rules"].append({
                              rule_type: unique_addresses
                          })
              
              return result_rules

          def parse_list_file(link, output_directory):
              try:
                  if '@' in link:
                      parts = link.rsplit('@', 1)
                      url = parts[0]
                      custom_name = parts[1] if len(parts) > 1 and '/' not in parts[1] else None
                      base_filename = custom_name if custom_name else os.path.basename(url).split('.')[0]
                  else:
                      url = link
                      base_filename = os.path.basename(url).split('.')[0]
                  
                  print(f"[处理] 开始处理: {base_filename}")
                  
                  with concurrent.futures.ThreadPoolExecutor(max_workers=3) as executor:
                      results = list(executor.map(parse_and_convert_to_dataframe, [url]))
                      dfs = [df for df, rules in results if df is not None]
                      rules_list = [rules for df, rules in results]
                      
                      if not dfs:
                          print(f"[警告] {base_filename}: 没有有效数据")
                          return None
                      
                      df = pd.concat(dfs, ignore_index=True)
                      df = df[~df['pattern'].astype(str).str.contains('#', na=False)].reset_index(drop=True)
                      df = df[df['pattern'].isin(MAP_DICT.keys())].reset_index(drop=True)
                      df = df.drop_duplicates().reset_index(drop=True)
                  
                  result_rules = build_result_rules(df, rules_list)
                  
                  os.makedirs(output_directory, exist_ok=True)
                  
                  file_name = os.path.join(output_directory, f"{base_filename}.json")
                  with open(file_name, 'w', encoding='utf-8') as output_file:
                      result_rules_str = json.dumps(
                          sort_dict(result_rules),
                          ensure_ascii=False,
                          indent=2
                      )
                      result_rules_str = result_rules_str.replace('\\\\', '\\')
                      output_file.write(result_rules_str)
                  
                  print(f"[✓] JSON 生成: {file_name}")
                  
                  srs_path = file_name.replace(".json", ".srs")
                  result = subprocess.run(
                      ["sing-box", "rule-set", "compile", "--output", srs_path, file_name],
                      capture_output=True,
                      text=True,
                      timeout=30
                  )
                  
                  if result.returncode != 0:
                      print(f"[✗] SRS 编译失败 ({base_filename}): {result.stderr}")
                  else:
                      print(f"[✓] SRS 编译成功: {srs_path}")
                  
                  total_rules = sum(len(v) for rule in result_rules['rules'] for v in rule.values() if isinstance(v, list))
                  print(f"[统计] {base_filename}: 总规则数 = {total_rules}, 规则类型 = {len(result_rules['rules'])}")
                  
                  return file_name
              
              except Exception as e:
                  print(f"[✗] 处理失败: {link}")
                  print(f"    原因: {str(e)}")
                  import traceback
                  traceback.print_exc()
                  return None

          print("=" * 60)
          print("Sing-box规则转换工具")
          print("=" * 60)

          try:
              with open("../rule.txt", 'r', encoding='utf-8') as links_file:
                  links = links_file.read().splitlines()
          except FileNotFoundError:
              print("[✗] 错误: 未找到 rule.txt 文件")
              exit(1)

          links = [l.strip() for l in links if l.strip() and not l.strip().startswith("#")]

          if not links:
              print("[✗] 错误: rule.txt 中没有有效的链接")
              exit(1)

          print(f"[信息] 检测到 {len(links)} 个规则链接\n")

          output_dir = "./"
          result_file_names = []

          for idx, link in enumerate(links, 1):
              print(f"\n[{idx}/{len(links)}] 处理链接:")
              result_file_name = parse_list_file(link, output_directory=output_dir)
              if result_file_name:
                  result_file_names.append(result_file_name)

          print("\n" + "=" * 60)
          print(f"处理完成! 成功生成 {len(result_file_names)} 个规则文件")
          print("=" * 60)

          EOF

      - name: Commit and push rules
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add ./singbox/*.json
          git add ./singbox/*.srs
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          else
            git commit -m "chore: update sing-box rules $(date +%Y-%m-%d)"
            git pull --rebase origin main || true
            git push
          fi
