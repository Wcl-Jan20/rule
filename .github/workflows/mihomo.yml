name: mihomo
on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * *"
permissions:
  contents: write
jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Mihomo
        shell: bash
        run: |
          curl -L -o mihomo.deb https://github.com/MetaCubeX/mihomo/releases/download/v1.19.27/mihomo-linux-amd64-v1.19.27.deb
          mkdir -p temp_deb
          dpkg -x mihomo.deb temp_deb
          mv temp_deb/usr/bin/mihomo ./mihomo-bin
          chmod +x mihomo-bin
          rm -rf temp_deb mihomo.deb

      - name: Process Rules
        shell: bash
        run: |
          mkdir -p mihomo
          
          python3 << 'PYTHON_EOF'
          import os
          import re
          import subprocess
          from urllib.request import urlopen
          from urllib.error import URLError
          
          def download_file(url, timeout=30):
              try:
                  with urlopen(url, timeout=timeout) as response:
                      return response.read().decode('utf-8', errors='ignore')
              except URLError as e:
                  print(f"[ERROR] {url}: {e}")
                  return None
          
          def extract_filename(url, custom_name=None):
              if custom_name:
                  return re.sub(r'[^a-zA-Z0-9_-]', '', custom_name)
              filename = os.path.basename(url)
              filename = re.sub(r'\?.*$', '', filename)
              filename = os.path.splitext(filename)[0]
              filename = re.sub(r'[^a-zA-Z0-9_-]', '', filename)
              return filename if filename else "rule"
          
          def is_ipv4_cidr(s):
              return re.match(r'^([0-9]{1,3}\.){3}[0-9]{1,3}/[0-9]{1,2}$', s) is not None
          
          def is_ipv6_cidr(s):
              return re.match(r'^([0-9a-fA-F]{0,4}:){2,7}[0-9a-fA-F]{0,4}/[0-9]{1,3}$', s) is not None
          
          def is_ip_cidr(s):
              return is_ipv4_cidr(s) or is_ipv6_cidr(s)
          
          def detect_rule_type(lines):
              ip_count = 0
              domain_count = 0
              for line in lines[:min(100, len(lines))]:
                  line = line.strip()
                  if not line:
                      continue
                  if is_ip_cidr(line):
                      ip_count += 1
                  else:
                      domain_count += 1
              return 'ipcidr' if ip_count > domain_count else 'domain'
          
          def normalize_rule(line):
              line = line.strip()
              if not line or line.startswith(('#', '//', '!')):
                  return None
              line = line.strip("'\"")
              
              if ',' in line:
                  parts = [p.strip() for p in line.split(',')]
                  rule_type = parts[0].upper()
                  rule_value = parts[1] if len(parts) > 1 else ''
                  if not rule_value:
                      return None
                  if rule_type in ['DOMAIN', 'FULL', 'DOMAIN-KEYWORD']:
                      return rule_value
                  elif rule_type in ['DOMAIN-SUFFIX', 'HOST-SUFFIX']:
                      if rule_value.startswith('+.'):
                          return rule_value
                      elif rule_value.startswith('*.'):
                          return '+.' + rule_value[2:]
                      elif rule_value.startswith('.'):
                          return '+' + rule_value
                      else:
                          return '+.' + rule_value
                  elif rule_type in ['IP-CIDR', 'IP-CIDR6', 'IP-ASN', 'SRC-IP-CIDR']:
                      return rule_value
                  else:
                      return None
              
              if line.startswith('||'):
                  if line.endswith('^'):
                      domain = line[2:-1]
                  else:
                      domain = line[2:]
                  if domain.startswith('+.'):
                      return domain
                  elif domain.startswith('*.'):
                      return '+.' + domain[2:]
                  elif domain.startswith('.'):
                      return '+' + domain
                  else:
                      return '+.' + domain
              
              if line.startswith('+.'):
                  return line
              elif line.startswith('*.'):
                  return '+.' + line[2:]
              elif line.startswith('.'):
                  return '+' + line
              
              return line
          
          def clean_rules(content):
              rules = set()
              lines = content.split('\n')
              in_payload = False
              for line in lines:
                  line_stripped = line.strip()
                  if line_stripped == 'payload:':
                      in_payload = True
                      continue
                  if in_payload:
                      if line_stripped.startswith('- '):
                          clean_line = line_stripped[2:].strip().strip("'\"")
                          if clean_line.startswith('- '):
                              clean_line = clean_line[2:].strip().strip("'\"")
                          normalized = normalize_rule(clean_line)
                          if normalized:
                              rules.add(normalized)
                      elif line_stripped and not line_stripped.startswith('#'):
                          if not line_stripped[0].isalnum() and line_stripped[0] not in ['.', '+', '*']:
                              in_payload = False
                  else:
                      normalized = normalize_rule(line)
                      if normalized:
                          rules.add(normalized)
              return sorted(list(rules))
          
          with open('rule.txt', 'r', encoding='utf-8') as f:
              urls = [l.strip() for l in f if l.strip() and not l.strip().startswith('#')]
          
          print("=" * 70)
          print("Mihomo Rule Converter")
          print("=" * 70)
          
          success_count = 0
          total_rules = 0
          
          for idx, line in enumerate(urls, 1):
              url = line
              filename = None
              if '@' in line:
                  parts = line.rsplit('@', 1)
                  url = parts[0].strip()
                  custom_part = parts[1].strip()
                  if '/' not in custom_part:
                      filename = custom_part
              filename = extract_filename(url, filename)
              print(f"\n[{idx}/{len(urls)}] {filename}")
              print(f"  URL: {url}")
              content = download_file(url)
              if not content:
                  print(f"  [✗] Failed")
                  continue
              rules = clean_rules(content)
              if not rules:
                  print(f"  [⚠] No rules found")
                  continue
              rule_type = detect_rule_type(rules)
              txt_file = f"mihomo/{filename}.txt"
              mrs_file = f"mihomo/{filename}.mrs"
              with open(txt_file, 'w', encoding='utf-8') as f:
                  for rule in rules:
                      f.write(rule + '\n')
              print(f"  [•] Extracted: {len(rules)} ({rule_type})")
              result = subprocess.run(
                  ['./mihomo-bin', 'convert-ruleset', rule_type, 'text', txt_file, mrs_file],
                  capture_output=True,
                  text=True,
                  timeout=60
              )
              if result.returncode == 0:
                  mrs_size = os.path.getsize(mrs_file)
                  print(f"  [✓] Success: {mrs_size} bytes")
                  success_count += 1
                  total_rules += len(rules)
              else:
                  print(f"  [✗] Failed: {result.stderr[:100]}")
                  if os.path.exists(txt_file):
                      os.remove(txt_file)
          
          print("\n" + "=" * 70)
          print(f"Done: {success_count} success, {total_rules} rules")
          print("=" * 70)
          PYTHON_EOF

      - name: Verify Rules
        shell: bash
        run: |
          echo ""
          echo "=== 规则统计 ==="
          echo ""
          TOTAL_FILES=0
          TOTAL_RULES=0
          TOTAL_SIZE=0
          
          for mrs in mihomo/*.mrs; do
            [ -f "$mrs" ] || continue
            BASENAME=$(basename "$mrs" .mrs)
            MRS_SIZE=$(stat -c%s "$mrs" 2>/dev/null || echo "0")
            TXT_LINES=$(wc -l < "mihomo/${BASENAME}.txt" 2>/dev/null || echo "0")
            
            printf "  %-30s %8d 规则 → %10s bytes\n" "$BASENAME" "$TXT_LINES" "$MRS_SIZE"
            
            TOTAL_FILES=$((TOTAL_FILES + 1))
            TOTAL_RULES=$((TOTAL_RULES + TXT_LINES))
            TOTAL_SIZE=$((TOTAL_SIZE + MRS_SIZE))
          done
          
          echo ""
          echo "总计: $TOTAL_FILES 文件, $TOTAL_RULES 条规则, $TOTAL_SIZE 字节"
          echo ""

      - name: Push to Repo
        shell: bash
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add mihomo/*.mrs mihomo/*.txt 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update mihomo rules: $(date '+%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main || true
            git push
          fi
