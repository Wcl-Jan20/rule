name: mihomo
on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * *"
permissions:
  contents: write
jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Mihomo
        shell: bash
        run: |
          curl -L -o mihomo.deb https://github.com/MetaCubeX/mihomo/releases/download/v1.19.23/mihomo-linux-amd64-v1.19.23.deb
          mkdir -p temp_deb
          dpkg -x mihomo.deb temp_deb
          mv temp_deb/usr/bin/mihomo ./mihomo-bin
          chmod +x mihomo-bin
          rm -rf temp_deb mihomo.deb

      - name: Process Rules
        shell: bash
        run: |
          mkdir -p mihomo
          
          python3 << 'PYTHON_EOF'
          import os
          import re
          import subprocess
          from urllib.request import urlopen
          from urllib.error import URLError
          
          def download_file(url, timeout=30):
              """下载文件内容"""
              try:
                  with urlopen(url, timeout=timeout) as response:
                      return response.read().decode('utf-8', errors='ignore')
              except URLError as e:
                  print(f"[ERROR] 无法下载 {url}: {e}")
                  return None
          
          def extract_filename(url, custom_name=None):
              """提取文件名"""
              if custom_name:
                  return re.sub(r'[^a-zA-Z0-9_-]', '', custom_name)
              
              filename = os.path.basename(url)
              filename = re.sub(r'\?.*$', '', filename)
              filename = os.path.splitext(filename)[0]
              filename = re.sub(r'[^a-zA-Z0-9_-]', '', filename)
              
              return filename if filename else "rule"
          
          def is_ipv4_cidr(s):
              """检测 IPv4 CIDR"""
              return re.match(r'^([0-9]{1,3}\.){3}[0-9]{1,3}/[0-9]{1,2}$', s) is not None
          
          def is_ipv6_cidr(s):
              """检测 IPv6 CIDR"""
              return re.match(r'^([0-9a-fA-F]{0,4}:){2,7}[0-9a-fA-F]{0,4}/[0-9]{1,3}$', s) is not None
          
          def is_ip_cidr(s):
              """检测是否为 IP CIDR"""
              return is_ipv4_cidr(s) or is_ipv6_cidr(s)
          
          def detect_rule_type(lines):
              """检测规则类型"""
              ip_count = 0
              domain_count = 0
              
              for line in lines[:min(100, len(lines))]:
                  line = line.strip()
                  if not line:
                      continue
                  if is_ip_cidr(line):
                      ip_count += 1
                  else:
                      domain_count += 1
              
              return 'ipcidr' if ip_count > domain_count else 'domain'
          
          def normalize_rule(line):
              """规范化单条规则 - 保留 Clash 通配符语法"""
              line = line.strip()
              
              if not line or line.startswith('#') or line.startswith('!'):
                  return None
              
              line = line.strip("'\"")
              
              # CSV 格式处理
              if ',' in line:
                  parts = [p.strip() for p in line.split(',')]
                  rule_type = parts[0].upper()
                  rule_value = parts[1] if len(parts) > 1 else ''
                  
                  if not rule_value:
                      return None
                  
                  if rule_type in ['DOMAIN', 'FULL']:
                      return rule_value
                  elif rule_type in ['DOMAIN-SUFFIX', 'HOST-SUFFIX']:
                      # 保留已有的 Clash 通配符前缀
                      if rule_value.startswith('+.'):
                          return rule_value
                      elif rule_value.startswith('.'):
                          return rule_value
                      elif rule_value.startswith('*.'):
                          return rule_value
                      else:
                          # 无前缀时添加 +.
                          return '+.' + rule_value
                  elif rule_type in ['IP-CIDR', 'IP-CIDR6', 'IP-ASN', 'SRC-IP-CIDR']:
                      return rule_value
                  else:
                      return None
              
              # 纯文本格式处理
              if line.startswith('||') and line.endswith('^'):
                  line = line[2:-1]
                  if not line.startswith(('+.', '.', '*.')):
                      return '+.' + line
                  return line
              elif line.startswith('||'):
                  line = line[2:]
                  if not line.startswith(('+.', '.', '*.')):
                      return '+.' + line
                  return line
              elif line.startswith('+.'):
                  return line
              elif line.startswith('.'):
                  return line
              elif line.startswith('*.'):
                  return line
              elif is_ip_cidr(line):
                  return line
              else:
                  return line
          
          def clean_rules(content):
              """清理和提取规则"""
              rules = set()
              
              lines = content.split('\n')
              
              in_payload = False
              for line in lines:
                  if line.strip() == 'payload:':
                      in_payload = True
                      continue
                  
                  if in_payload and line.startswith('- '):
                      line = line[2:]
                  elif in_payload and line and not line[0].isalnum() and line[0] not in ['.', '+', '*']:
                      in_payload = False
                  
                  normalized = normalize_rule(line)
                  if normalized:
                      rules.add(normalized)
              
              return sorted(list(rules))
          
          with open('rule.txt', 'r', encoding='utf-8') as f:
              urls = [l.strip() for l in f if l.strip() and not l.strip().startswith('#')]
          
          print("=" * 70)
          print("Mihomo 规则转换工具 v2.5")
          print("=" * 70)
          
          success_count = 0
          total_rules = 0
          
          for idx, line in enumerate(urls, 1):
              url = line
              filename = None
              
              if '@' in line:
                  parts = line.rsplit('@', 1)
                  url = parts[0].strip()
                  custom_part = parts[1].strip()
                  if '/' not in custom_part:
                      filename = custom_part
              
              filename = extract_filename(url, filename)
              
              print(f"\n[{idx}/{len(urls)}] {filename}")
              print(f"  URL: {url}")
              
              content = download_file(url)
              if not content:
                  print(f"  [✗] 下载失败")
                  continue
              
              rules = clean_rules(content)
              
              if not rules:
                  print(f"  [⚠] 未找到规则")
                  continue
              
              rule_type = detect_rule_type(rules)
              
              txt_file = f"mihomo/{filename}.txt"
              mrs_file = f"mihomo/{filename}.mrs"
              
              with open(txt_file, 'w', encoding='utf-8') as f:
                  for rule in rules:
                      f.write(rule + '\n')
              
              print(f"  [•] 提取: {len(rules)} 条规则 ({rule_type})")
              
              result = subprocess.run(
                  ['./mihomo-bin', 'convert-ruleset', rule_type, 'text', txt_file, mrs_file],
                  capture_output=True,
                  text=True,
                  timeout=60
              )
              
              if result.returncode == 0:
                  mrs_size = os.path.getsize(mrs_file)
                  print(f"  [✓] 编译成功: {mrs_size} bytes")
                  success_count += 1
                  total_rules += len(rules)
              else:
                  print(f"  [✗] 编译失败: {result.stderr[:100]}")
                  if os.path.exists(txt_file):
                      os.remove(txt_file)
          
          print("\n" + "=" * 70)
          print(f"完成: {success_count} 成功, 共 {total_rules} 条规则")
          print("=" * 70)
          PYTHON_EOF

      - name: Verify Rules
        shell: bash
        run: |
          echo ""
          echo "=== 规则统计 ==="
          echo ""
          TOTAL_FILES=0
          TOTAL_RULES=0
          TOTAL_SIZE=0
          
          for mrs in mihomo/*.mrs; do
            [ -f "$mrs" ] || continue
            BASENAME=$(basename "$mrs" .mrs)
            MRS_SIZE=$(stat -c%s "$mrs" 2>/dev/null || echo "0")
            TXT_LINES=$(wc -l < "mihomo/${BASENAME}.txt" 2>/dev/null || echo "0")
            
            printf "  %-30s %8d 规则 → %10s bytes\n" "$BASENAME" "$TXT_LINES" "$MRS_SIZE"
            
            TOTAL_FILES=$((TOTAL_FILES + 1))
            TOTAL_RULES=$((TOTAL_RULES + TXT_LINES))
            TOTAL_SIZE=$((TOTAL_SIZE + MRS_SIZE))
          done
          
          echo ""
          echo "总计: $TOTAL_FILES 文件, $TOTAL_RULES 条规则, $TOTAL_SIZE 字节"
          echo ""

      - name: Push to Repo
        shell: bash
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add mihomo/*.mrs mihomo/*.txt 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update mihomo rules: $(date '+%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main || true
            git push
          fi
